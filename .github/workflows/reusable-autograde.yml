name: Reusable Autograde

on:
  workflow_call:
    inputs:
      milestone:
        description: "Milestone id เช่น M0, M1, M2, M3"
        required: true
        type: string

      student_ref:
        description: "Git ref of student repo to grade (tag/branch/sha)"
        required: false
        type: string
        default: ""

      autograder_repo:
        description: "grading repo (owner/repo)"
        required: false
        type: string
        default: "2110634-SDD/sdd-autograding"

      autograder_ref:
        description: "ref ของ grading repo (branch/tag/sha)"
        required: false
        type: string
        default: "main"

      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.11"

      debug:
        description: "เปิด debug logging (true/false)"
        required: false
        type: boolean
        default: false

      results_dir:
        description: "โฟลเดอร์ผลลัพธ์ใน student repo"
        required: false
        type: string
        default: "grading"

permissions:
  contents: read
  actions: read

jobs:
  autograde:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve submission ref/tag
        id: subref
        shell: bash
        run: |
          set -euo pipefail

          REF_INPUT="${{ inputs.student_ref }}"
          GH_REF="${GITHUB_REF:-}"
          GH_REF_NAME="${GITHUB_REF_NAME:-}"

          RESOLVED_REF=""
          SUBMISSION_TAG=""

          if [ -n "$REF_INPUT" ]; then
            RESOLVED_REF="$REF_INPUT"
            # best-effort: if looks like a tag name, expose it
            case "$REF_INPUT" in
              m*|M*|v*|V*) SUBMISSION_TAG="$REF_INPUT" ;;
              *) SUBMISSION_TAG="" ;;
            esac
          else
            if [[ "$GH_REF" == refs/tags/* ]] && [ -n "$GH_REF_NAME" ]; then
              RESOLVED_REF="$GH_REF_NAME"
              SUBMISSION_TAG="$GH_REF_NAME"
            else
              RESOLVED_REF="${GITHUB_SHA}"
              SUBMISSION_TAG=""
            fi
          fi

          echo "resolved_ref=$RESOLVED_REF" >> "$GITHUB_OUTPUT"
          echo "submission_tag=$SUBMISSION_TAG" >> "$GITHUB_OUTPUT"

          echo "▶ RESOLVED_REF=$RESOLVED_REF"
          echo "▶ SUBMISSION_TAG=$SUBMISSION_TAG"

      - name: Checkout student repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.subref.outputs.resolved_ref }}

      - name: Show student repo info
        shell: bash
        run: |
          set -euo pipefail
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
          git rev-parse --show-toplevel || true
          git show -s --oneline --decorate HEAD || true
          git rev-list --count HEAD || true

      - name: Checkout autograder repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.autograder_repo }}
          ref: ${{ inputs.autograder_ref }}
          path: sdd-autograding
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install autograder dependencies
        shell: bash
        working-directory: sdd-autograding
        run: |
          set -euo pipefail
          python -V
          pip -V
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt in sdd-autograding; skipping pip install."
          fi

      - name: Run autograder
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          STUDENT_REPO_PATH: ${{ github.workspace }}
          GRADER_DEBUG: ${{ inputs.debug && '1' || '0' }}
          SUBMISSION_REF: ${{ steps.subref.outputs.resolved_ref }}
          SUBMISSION_TAG: ${{ steps.subref.outputs.submission_tag }}
        working-directory: sdd-autograding
        run: |
          set -euo pipefail
          echo "▶ MILESTONE=$MILESTONE"
          echo "▶ STUDENT_REPO_PATH=$STUDENT_REPO_PATH"
          echo "▶ GRADER_DEBUG=$GRADER_DEBUG"
          echo "▶ SUBMISSION_REF=$SUBMISSION_REF"
          echo "▶ SUBMISSION_TAG=$SUBMISSION_TAG"
          python -m grader.main

      - name: Verify grading result
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          RESULTS_DIR: ${{ inputs.results_dir }}
        run: |
          set -euo pipefail
          RESULT_PATH="${RESULTS_DIR}/grading_result_${MILESTONE}.json"
          if [ ! -f "$RESULT_PATH" ]; then
            echo "::error::Missing result file: $RESULT_PATH"
            echo "Found these grading_result*.json files:"
            find . -maxdepth 6 -type f -name "grading_result*.json" -print || true
            exit 1
          fi
          echo "Found: $RESULT_PATH"
          sed -n '1,120p' "$RESULT_PATH"

      - name: Render human-friendly summary + annotations
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          RESULTS_DIR: ${{ inputs.results_dir }}
          SUBMISSION_REF: ${{ steps.subref.outputs.resolved_ref }}
          SUBMISSION_TAG: ${{ steps.subref.outputs.submission_tag }}
        run: |
          set -euo pipefail
          RESULT_PATH="${RESULTS_DIR}/grading_result_${MILESTONE}.json"
          SUMMARY_MD="${RESULTS_DIR}/summary_${MILESTONE}.md"
          ANNO_TXT="${RESULTS_DIR}/annotations_${MILESTONE}.txt"

          python sdd-autograding/tools/render_summary.py \
            --result "$RESULT_PATH" \
            --milestone "$MILESTONE" \
            --submission-ref "${SUBMISSION_REF}" \
            --submission-tag "${SUBMISSION_TAG}" \
            --summary-out "$SUMMARY_MD" \
            --annotations-out "$ANNO_TXT"

          cat "$SUMMARY_MD" >> "$GITHUB_STEP_SUMMARY"
          cat "$ANNO_TXT"

      - name: Upload grading artifact
        uses: actions/upload-artifact@v4
        with:
          name: grading_result_${{ inputs.milestone }}
          path: |
            ${{ inputs.results_dir }}/grading_result_${{ inputs.milestone }}.json
            ${{ inputs.results_dir }}/summary_${{ inputs.milestone }}.md
            ${{ inputs.results_dir }}/annotations_${{ inputs.milestone }}.txt
          if-no-files-found: error

      - name: Done
        shell: bash
        run: |
          set -euo pipefail
          echo "✅ Autograde finished for milestone=${{ inputs.milestone }}"