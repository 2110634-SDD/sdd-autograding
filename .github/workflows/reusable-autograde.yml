name: Reusable Autograde

on:
  workflow_call:
    inputs:
      milestone:
        description: 'Milestone to grade (e.g. M0, M1, M2, M3)'
        required: true
        type: string
      tag:
        description: 'Git tag to checkout (optional, defaults to milestone)'
        required: false
        type: string

# Required to commit/push grading results back to the student repository
permissions:
  contents: write

jobs:
  autograde:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout student repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ inputs.tag }}" ]; then
            echo "TAG=${{ inputs.milestone }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout grading logic
        uses: actions/checkout@v4
        with:
          repository: 2110634-SDD/sdd-autograding
          path: sdd-autograding
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run autograder
        env:
          MILESTONE: ${{ inputs.milestone }}
          TAG: ${{ steps.vars.outputs.TAG }}
        shell: bash
        run: |
          set -euxo pipefail

          echo "▶ Grading milestone: $MILESTONE"
          echo "▶ Using tag: $TAG"

          # Checkout the tagged submission (usually detached HEAD)
          git checkout "tags/$TAG"

          # Run autograder (grading repo code)
          cd sdd-autograding
          python -m grader.main || true

          # Normalize output location in the student workspace
          mkdir -p "$GITHUB_WORKSPACE/grading"
          SRC="$GITHUB_WORKSPACE/sdd-autograding/grading_result.json"
          DST="$GITHUB_WORKSPACE/grading/grading_result_${MILESTONE}.json"

          test -f "$SRC"
          cp -f "$SRC" "$DST"
          ls -la "$DST"

      - name: Debug locate grading_result.json
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "PWD=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "---- find grading_result.json ----"
          find "$GITHUB_WORKSPACE" -maxdepth 5 -name "grading_result.json" -print -ls || true
          echo "---- list workspace root ----"
          ls -la "$GITHUB_WORKSPACE" || true
          echo "---- list sdd-autograding ----"
          ls -la "$GITHUB_WORKSPACE/sdd-autograding" || true
          echo "---- list grading ----"
          ls -la "$GITHUB_WORKSPACE/grading" || true

      - name: Upload grading result artifact
        uses: actions/upload-artifact@v4
        with:
          name: grading-result-${{ inputs.milestone }}
          path: grading/grading_result_${{ inputs.milestone }}.json
          if-no-files-found: error

      - name: Commit grading result into student repo
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          M="${{ inputs.milestone }}"
          SRC_REL="grading/grading_result_${M}.json"
          SRC_ABS="$GITHUB_WORKSPACE/$SRC_REL"
          TMP="/tmp/grading_result_${M}.json"

          if [ ! -f "$SRC_ABS" ]; then
            echo "No grading result file found at $SRC_ABS"
            exit 0
          fi

          # Save result to a temp location so branch checkout won't wipe it
          cp -f "$SRC_ABS" "$TMP"
          ls -la "$TMP"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          echo "Default branch: $DEFAULT_BRANCH"