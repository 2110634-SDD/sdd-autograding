name: Reusable Autograde

on:
  workflow_call:
    inputs:
      milestone:
        description: "Milestone id เช่น M0, M1, M2, M3"
        required: true
        type: string

      student_ref:
        description: "Git ref of student repo to grade (tag/branch/sha)"
        required: false
        type: string
        default: ""

      autograder_repo:
        description: "grading repo (owner/repo)"
        required: false
        type: string
        default: "2110634-SDD/sdd-autograding"
      autograder_ref:
        description: "ref ของ grading repo (branch/tag/sha)"
        required: false
        type: string
        default: "main"

      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.11"

      debug:
        description: "เปิด debug logging (true/false)"
        required: false
        type: boolean
        default: false

      commit_results:
        description: "commit grading result กลับเข้า repo ของนิสิต (true/false)"
        required: false
        type: boolean
        default: false

      results_dir:
        description: "โฟลเดอร์ผลลัพธ์ใน student repo"
        required: false
        type: string
        default: "grading"

permissions:
  contents: write
  actions: read

jobs:
  autograde:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout student repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          # ✅ Prefer explicit ref from caller; otherwise use the triggering SHA (deterministic for workflow_call)
          ref: ${{ inputs.student_ref != '' && inputs.student_ref || github.sha }}

      - name: Show student repo info
        shell: bash
        run: |
          set -euo pipefail
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
          git rev-parse --show-toplevel || true
          git show -s --oneline --decorate HEAD || true
          git rev-list --count HEAD || true

      - name: Checkout autograder repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.autograder_repo }}
          ref: ${{ inputs.autograder_ref }}
          path: sdd-autograding
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install autograder dependencies
        shell: bash
        working-directory: sdd-autograding
        run: |
          set -euo pipefail
          python -V
          pip -V
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt in sdd-autograding; skipping pip install."
          fi

      - name: Run autograder
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          # ✅ Used by GradingContext.from_env() to grade the student repo even when running inside sdd-autograding/
          STUDENT_REPO_PATH: ${{ github.workspace }}
          GRADER_DEBUG: ${{ inputs.debug && '1' || '0' }}
        working-directory: sdd-autograding
        run: |
          set -euo pipefail
          echo "▶ MILESTONE=$MILESTONE"
          echo "▶ STUDENT_REPO_PATH=$STUDENT_REPO_PATH"
          echo "▶ GRADER_DEBUG=$GRADER_DEBUG"
          python -m grader.main

      - name: Verify grading result
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          RESULTS_DIR: ${{ inputs.results_dir }}
        run: |
          set -euo pipefail
          RESULT_PATH="${RESULTS_DIR}/grading_result_${MILESTONE}.json"
          if [ ! -f "$RESULT_PATH" ]; then
            echo "::error::Missing result file: $RESULT_PATH"
            echo "Found these grading_result*.json files:"
            find . -maxdepth 6 -type f -name "grading_result*.json" -print || true
            exit 1
          fi
          echo "Found: $RESULT_PATH"
          sed -n '1,80p' "$RESULT_PATH"

      - name: Upload grading artifact
        uses: actions/upload-artifact@v4
        with:
          name: grading_result_${{ inputs.milestone }}
          path: |
            ${{ inputs.results_dir }}/grading_result_${{ inputs.milestone }}.json
            grading_result.json
          if-no-files-found: error

      - name: Commit grading result to student repo (default branch)
        if: ${{ inputs.commit_results }}
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          RESULTS_DIR: ${{ inputs.results_dir }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          RESULT_PATH="${RESULTS_DIR}/grading_result_${MILESTONE}.json"
          LEGACY_PATH="grading_result.json"

          if [ ! -f "$RESULT_PATH" ]; then
            echo "::warning::Result file missing, skip commit: $RESULT_PATH"
            exit 0
          fi

          echo "▶ Preparing to commit results to default branch: ${DEFAULT_BRANCH}"
          echo "Current HEAD:"
          git show -s --oneline --decorate HEAD || true

          # Save results to temp to survive branch checkout (tag/detached-head safe)
          TMP_DIR="/tmp/autograde"
          mkdir -p "$TMP_DIR"
          cp -f "$RESULT_PATH" "$TMP_DIR/$(basename "$RESULT_PATH")"
          if [ -f "$LEGACY_PATH" ]; then
            cp -f "$LEGACY_PATH" "$TMP_DIR/$(basename "$LEGACY_PATH")"
          fi

          # Switch to default branch safely
          git fetch origin "${DEFAULT_BRANCH}:${DEFAULT_BRANCH}" || true
          git checkout "${DEFAULT_BRANCH}"
          git pull --ff-only origin "${DEFAULT_BRANCH}" || true

          # Restore results into working tree
          mkdir -p "${RESULTS_DIR}"
          cp -f "$TMP_DIR/$(basename "$RESULT_PATH")" "$RESULT_PATH"
          if [ -f "$TMP_DIR/$(basename "$LEGACY_PATH")" ]; then
            cp -f "$TMP_DIR/$(basename "$LEGACY_PATH")" "$LEGACY_PATH"
          fi

          git config user.name  "autograder-bot"
          git config user.email "autograder-bot@users.noreply.github.com"

          git add "$RESULT_PATH" "$LEGACY_PATH" || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(autograde): add grading result for ${MILESTONE} [skip ci]" || true
          git push origin "${DEFAULT_BRANCH}"

      - name: Done
        shell: bash
        run: |
          set -euo pipefail
          echo "✅ Autograde finished for milestone=${{ inputs.milestone }}"