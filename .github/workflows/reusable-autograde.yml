name: Reusable Autograde

on:
  workflow_call:
    inputs:
      milestone:
        description: "Milestone id เช่น M0, M1, M2, M3"
        required: true
        type: string

      student_ref:
        description: "Git ref of student repo to grade (tag/branch/sha)"
        required: false
        type: string
        default: ""

      autograder_repo:
        description: "grading repo (owner/repo)"
        required: false
        type: string
        default: "2110634-SDD/sdd-autograding"
      autograder_ref:
        description: "ref ของ grading repo (branch/tag/sha)"
        required: false
        type: string
        default: "main"

      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.11"

      debug:
        description: "เปิด debug logging (true/false)"
        required: false
        type: boolean
        default: false

      commit_results:
        description: "commit grading result กลับเข้า repo ของนิสิต (true/false)"
        required: false
        type: boolean
        default: false

      results_dir:
        description: "โฟลเดอร์ผลลัพธ์ใน student repo"
        required: false
        type: string
        default: "grading"

permissions:
  contents: write
  actions: read

jobs:
  autograde:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout student repo (caller) at requested ref (tag/branch/sha)
      - name: Checkout student repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ inputs.student_ref != '' && inputs.student_ref || github.ref }}

      - name: Show student repo info
        shell: bash
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_REF_NAME=${GITHUB_REF_NAME}"
          echo "DEFAULT_BRANCH=${{ github.event.repository.default_branch }}"
          echo "Student repo toplevel:"
          git rev-parse --show-toplevel || true
          echo "HEAD:"
          git show -s --oneline --decorate HEAD || true
          echo "Commit count:"
          git rev-list --count HEAD || true

      # 2) Checkout autograder repo into subdir
      - name: Checkout autograder repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.autograder_repo }}
          ref: ${{ inputs.autograder_ref }}
          path: sdd-autograding
          fetch-depth: 0

      - name: Verify autograder checkout
        shell: bash
        run: |
          echo "Listing sdd-autograding/ (top-level):"
          ls -la sdd-autograding || true

      # 3) Setup python (NO pip cache)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      # 4) Install dependencies (if any)
      - name: Install autograder dependencies
        shell: bash
        working-directory: sdd-autograding
        run: |
          python -V
          pip -V
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt in sdd-autograding; skipping pip install."
          fi

      # 5) Run autograder
      - name: Run autograder
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          STUDENT_REPO_PATH: ${{ github.workspace }}
          GRADER_DEBUG: ${{ inputs.debug && '1' || '0' }}
        working-directory: sdd-autograding
        run: |
          echo "▶ MILESTONE=$MILESTONE"
          echo "▶ STUDENT_REPO_PATH=$STUDENT_REPO_PATH"
          echo "▶ GRADER_DEBUG=$GRADER_DEBUG"
          python -m grader.main

      # 6) Verify results exist
      - name: Verify grading result
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          RESULTS_DIR: ${{ inputs.results_dir }}
        run: |
          RESULT_PATH="${RESULTS_DIR}/grading_result_${MILESTONE}.json"
          if [ ! -f "$RESULT_PATH" ]; then
            echo "::error::Missing result file: $RESULT_PATH"
            find . -maxdepth 4 -type f -name "grading_result*.json" -print
            exit 1
          fi
          echo "Found: $RESULT_PATH"
          sed -n '1,40p' "$RESULT_PATH"

      # 7) Upload artifact
      - name: Upload grading artifact
        uses: actions/upload-artifact@v4
        with:
          name: grading_result_${{ inputs.milestone }}
          path: |
            ${{ inputs.results_dir }}/grading_result_${{ inputs.milestone }}.json
            grading_result.json
          if-no-files-found: error

      # 8) Optionally commit results back to student repo
      # ✅ FIX: Even if we graded a tag (detached HEAD), we commit to DEFAULT_BRANCH
      - name: Commit grading result to student repo (default branch)
        if: ${{ inputs.commit_results }}
        shell: bash
        env:
          MILESTONE: ${{ inputs.milestone }}
          RESULTS_DIR: ${{ inputs.results_dir }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -e

          RESULT_PATH="${RESULTS_DIR}/grading_result_${MILESTONE}.json"
          LEGACY_PATH="grading_result.json"

          echo "▶ Preparing to commit results to default branch: ${DEFAULT_BRANCH}"
          echo "Current HEAD:"
          git show -s --oneline --decorate HEAD || true

          # copy results out to a safe place before switching branches
          mkdir -p /tmp/grading_out
          cp -f "$RESULT_PATH" "/tmp/grading_out/$(basename "$RESULT_PATH")"
          if [ -f "$LEGACY_PATH" ]; then
            cp -f "$LEGACY_PATH" "/tmp/grading_out/$(basename "$LEGACY_PATH")"
          fi

          # switch to default branch
          git fetch origin "${DEFAULT_BRANCH}:${DEFAULT_BRANCH}" || true
          git checkout "${DEFAULT_BRANCH}"
          git pull --ff-only origin "${DEFAULT_BRANCH}" || true

          # restore results into working tree
          mkdir -p "${RESULTS_DIR}"
          cp -f "/tmp/grading_out/$(basename "$RESULT_PATH")" "$RESULT_PATH"
          if [ -f "/tmp/grading_out/$(basename "$LEGACY_PATH")" ]; then
            cp -f "/tmp/grading_out/$(basename "$LEGACY_PATH")" "$LEGACY_PATH"
          fi

          git config user.name  "autograder-bot"
          git config user.email "autograder-bot@users.noreply.github.com"

          git add "$RESULT_PATH" "$LEGACY_PATH" || true

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(autograde): add grading result for ${MILESTONE}" || true
          git push origin "${DEFAULT_BRANCH}"

      - name: Done
        shell: bash
        run: |
          echo "✅ Autograde finished for milestone=${{ inputs.milestone }}"